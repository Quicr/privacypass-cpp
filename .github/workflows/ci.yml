name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install openssl@3

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: |
          choco install openssl -y
          echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DPRIVACY_PASS_BUILD_TESTS=ON `
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON `
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Configure with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPRIVACY_PASS_ENABLE_SANITIZERS=ON \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test with sanitizers
        run: ctest --test-dir build --output-on-failure
