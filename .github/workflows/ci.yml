name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (${{ matrix.openssl }} ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        openssl: [openssl3]
        include:
          - openssl: openssl1.1
            build_type: Release
          - openssl: openssl1.1
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL 3.x
        if: matrix.openssl == 'openssl3'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Build and install OpenSSL 1.1
        if: matrix.openssl == 'openssl1.1'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          curl -fsSL https://www.openssl.org/source/openssl-1.1.1w.tar.gz | tar xz
          cd openssl-1.1.1w
          ./config --prefix=/opt/openssl-1.1 --openssldir=/opt/openssl-1.1 no-shared
          make -j$(nproc)
          sudo make install_sw
          cd ..
          rm -rf openssl-1.1.1w

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON \
            ${{ matrix.openssl == 'openssl1.1' && '-DOPENSSL_ROOT_DIR=/opt/openssl-1.1' || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install openssl@3

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: |
          choco install openssl -y
          echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DPRIVACY_PASS_BUILD_TESTS=ON `
            -DPRIVACY_PASS_BUILD_BENCHMARKS=ON `
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Configure with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPRIVACY_PASS_ENABLE_SANITIZERS=ON \
            -DPRIVACY_PASS_BUILD_TESTS=ON \
            -DPRIVACY_PASS_BUILD_MOQ=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test with sanitizers
        run: ctest --test-dir build --output-on-failure
